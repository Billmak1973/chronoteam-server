<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
</head>
<body>

<!-- ==================== 公共登录状态 Fragment ==================== -->
<script th:fragment="login-state" th:inline="javascript">
    //  获取 Thymeleaf 后端变量（所有页面共享）
    const isLoggedIn = [[${#authorization.expression('isAuthenticated()')} ?: false]];
</script>

<!-- ==================== 公共购物车 JS Fragment ==================== -->
<script th:fragment="cart-js">
    // ===== 购物车功能 =====
    let cartDropdownOpen = false;

    function toggleCartDropdown(event) {
        event.stopPropagation();
        const dropdown = document.getElementById('cartDropdown');
        cartDropdownOpen = !cartDropdownOpen;
        if (cartDropdownOpen) {
            dropdown.style.display = 'flex';
            dropdown.style.flexDirection = 'column';
            loadCartItems();
        } else {
            dropdown.style.display = 'none';
        }
    }

    document.addEventListener('click', function(e) {
        const cartDropdown = document.getElementById('cartDropdown');
        if (cartDropdown && !cartDropdown.contains(e.target)) {
            cartDropdown.style.display = 'none';
            cartDropdownOpen = false;
        }
    });

    // 监听购物车区域鼠标离开事件
    const cartDropdownEl = document.getElementById('cartDropdown');
    const cartNavContainer = cartDropdownEl ? cartDropdownEl.closest('.nav-dropdown') : null;
    if (cartNavContainer) {
        cartNavContainer.addEventListener('mouseleave', function() {
            const dropdown = document.getElementById('cartDropdown');
            if (dropdown) {
                dropdown.style.display = '';
                dropdown.style.flexDirection = '';
                cartDropdownOpen = false;
            }
        });
    }

    async function loadCartItems() {
        try {
            const response = await fetch('/api/cart/list');
            const data = await response.json();
            if (data.success) {
                renderCartItems(data.cartItems, data.totalAmount);
                updateCartBadge(data.cartCount);
            }
        } catch (error) {
            console.error('加载购物车失败:', error);
        }
    }

    function renderCartItems(cartItems, totalAmount) {
        const container = document.getElementById('cartItemsContainer');
        if (!container) return;
        if (!cartItems || cartItems.length === 0) {
            container.innerHTML = `
                <div class="cart-empty">
                    <i class="fas fa-shopping-basket" style="font-size: 3rem; color: #ddd; margin-bottom: 1rem;"></i>
                    <p>購物車是空的</p>
                </div>
            `;
            const totalEl = document.getElementById('cartTotalAmount');
            if(totalEl) totalEl.textContent = 'HK$ 0';
            return;
        }
        let html = '';
cartItems.forEach(item => {
    html += `
        <div class="cart-item" data-cart-id="${item.cartId}" data-product-id="${item.product.productId}">
            <div class="cart-item-img">
                <img src="/images/products/${item.product.image}" alt="${item.product.description}"
                     onerror="this.src='/images/placeholder.png'">
            </div>
            <div class="cart-item-info">
                <div class="cart-item-name">${item.product.description}</div>
                <div class="cart-item-price">HK$ ${formatPrice(item.price)}</div>
                <div class="cart-item-quantity">
                    <button class="qty-btn" onclick="updateCartQuantity(${item.cartId}, ${item.quantity - 1})" ${item.quantity <= 1 ? 'disabled' : ''}>-</button>
                    <span class="qty-value">${item.quantity}</span>
                    <button class="qty-btn" onclick="updateCartQuantity(${item.cartId}, ${item.quantity + 1})" ${item.quantity >= item.product.stock ? 'disabled' : ''}>+</button>
                </div>
            </div>
            <div class="cart-item-remove" onclick="removeFromCart(${item.product.productId})">
                <i class="fas fa-trash-alt"></i>
            </div>
        </div>
    `;
});
        container.innerHTML = html;
        const totalEl = document.getElementById('cartTotalAmount');
        if(totalEl) totalEl.textContent = 'HK$ ' + formatPrice(totalAmount);
    }

    async function updateCartQuantity(cartId, newQuantity) {
        try {
            const response = await fetch(`/api/cart/update/${cartId}?quantity=${newQuantity}`, { method: 'PUT' });
            const data = await response.json();
            if (response.ok) {
                loadCartItems();
            } else {
                alert(data.message || '更新失敗');
            }
        } catch (error) {
            console.error('更新购物车失败:', error);
            alert('网络错误');
        }
    }

    async function removeFromCart(productId) {
        if (!confirm('確定要移除這個商品嗎？')) return;
        try {
            const response = await fetch(`/api/cart/remove/${productId}`, { method: 'DELETE' });
            if (response.ok) {
                loadCartItems();
            }
        } catch (error) {
            console.error('移除商品失败:', error);
        }
    }

    function updateCartBadge(count) {
        const badge = document.getElementById('cartCountBadge');
        if (!badge) return;
        if (count > 0) {
            badge.textContent = count;
            badge.style.display = 'inline-flex';
        } else {
            badge.style.display = 'none';
        }
    }

    function formatPrice(price) {
        return new Intl.NumberFormat('zh-HK', {
            minimumFractionDigits: 0,
            maximumFractionDigits: 0
        }).format(price);
    }

    function checkout() {
        window.location.href = '/checkout';
    }

    // 加入购物车（通用）
    async function addToCart(productId) {
        if (!isLoggedIn) {
            showNotification('❌ 請先登入後再加入購物車！', true);
            return;
        }
        try {
            const response = await fetch(`/api/cart/add/${productId}`, { method: 'POST' });
            const data = await response.json();
            if (response.ok) {
                showNotification('✅ 已加入購物車');
                loadCartItems();
            } else {
                showNotification('❌ ' + (data.message || '加入失敗'), true);
            }
        } catch (error) {
            console.error('加入购物车失败:', error);
            showNotification('❌ 网络错误', true);
        }
    }

    // 显示通知
    function showNotification(message, isError = false) {
        const notification = document.createElement('div');
        notification.style.cssText = `
            position: fixed;
            top: 100px;
            right: 20px;
            background: ${isError ? 'var(--accent)' : 'var(--gold)'};
            color: ${isError ? 'white' : 'var(--primary)'};
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 9999;
            opacity: 0;
            transform: translateX(50px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        `;
        notification.textContent = message;
        document.body.appendChild(notification);
        setTimeout(() => {
            notification.style.opacity = '1';
            notification.style.transform = 'translateX(0)';
        }, 10);
        setTimeout(() => {
            notification.style.opacity = '0';
            notification.style.transform = 'translateX(50px)';
            setTimeout(() => notification.remove(), 300);
        }, 2500);
    }

    // 登出功能
    async function handleLogout() {
        if (!confirm('確定要登出嗎？')) return;
        try {
            const response = await fetch('/logout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            window.location.href = '/';
        } catch (error) {
            console.error('登出失败:', error);
            window.location.href = '/';
        }
    }

    // 页面加载时初始化购物车
    document.addEventListener('DOMContentLoaded', function() {
        if (document.querySelector('.nav-dropdown')) {
            loadCartItems();
        }
    });
</script>

<!-- ==================== 登录/注册弹窗 Fragment ==================== -->
<div th:fragment="login-register-modals">
    <!-- 注册弹窗 -->
    <div id="registerModal" class="modal">
        <div class="modal-content" style="max-height: 90vh; overflow-y: auto;">
            <button class="modal-close" onclick="closeRegisterModal()" aria-label="關閉">&times;</button>
            <h3 style="margin-bottom:1.2rem; color:var(--primary); text-align:center; font-size:1.3rem;">
                <i class="fas fa-user-plus" style="color:var(--gold); margin-right:0.5rem;"></i>創建新帳戶
            </h3>
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div style="margin-bottom:0.8rem;">
                    <label style="display:block; margin-bottom:0.25rem; font-weight:500; font-size:0.9rem;">用戶名 *</label>
                    <input type="text" name="username" required maxlength="50" placeholder="3-50位，字母數字組合"
                           style="width:100%; padding:0.6rem; border:2px solid #e9ecef; border-radius:8px; font-size:0.9rem;">
                </div>
                <div style="margin-bottom:0.8rem;">
                    <label style="display:block; margin-bottom:0.25rem; font-weight:500; font-size:0.9rem;">真實姓名 *</label>
                    <input type="text" name="name" required maxlength="100" placeholder="請輸入您的真實姓名"
                           style="width:100%; padding:0.6rem; border:2px solid #e9ecef; border-radius:8px; font-size:0.9rem;">
                </div>
                <div style="margin-bottom:0.8rem;">
                    <label style="display:block; margin-bottom:0.25rem; font-weight:500; font-size:0.9rem;">電子郵件 *</label>
                    <input type="email" name="email" required maxlength="100" placeholder="example@email.com"
                           style="width:100%; padding:0.6rem; border:2px solid #e9ecef; border-radius:8px; font-size:0.9rem;">
                </div>
                <div style="margin-bottom:0.8rem; position:relative;">
                    <label style="display:block; margin-bottom:0.25rem; font-weight:500; font-size:0.9rem;">密碼 *</label>
                    <input type="password" name="password" id="regPassword" required minlength="6" placeholder="至少6位字符"
                           style="width:100%; padding:0.6rem; border:2px solid #e9ecef; border-radius:8px; font-size:0.9rem; padding-right:2.5rem;">
                    <i class="fas fa-eye password-toggle" id="toggleRegPassword"
                       onclick="togglePassword('regPassword', this)" aria-label="切換密碼可見性"></i>
                </div>
                <div style="margin-bottom:0.8rem;">
                    <label style="display:block; margin-bottom:0.25rem; font-weight:500; font-size:0.9rem;">確認密碼 *</label>
                    <input type="password" name="confirmPassword" id="confirmPassword" required minlength="6"
                           placeholder="請再次輸入密碼"
                           style="width:100%; padding:0.6rem; border:2px solid #e9ecef; border-radius:8px; font-size:0.9rem;">
                </div>
                <div style="margin-bottom:1.2rem;">
                    <label style="display:block; margin-bottom:0.25rem; font-weight:500; font-size:0.9rem;">手機號碼 *</label>
                    <input type="tel" name="phone" required maxlength="20" placeholder="例如: +852 1234 5678"
                           style="width:100%; padding:0.6rem; border:2px solid #e9ecef; border-radius:8px; font-size:0.9rem;">
                </div>
                <button type="submit" class="btn btn-primary"
                        style="width:100%; justify-content:center; padding:0.7rem;">
                    <i class="fas fa-user-check"></i> 立即註冊
                </button>
            </form>
            <div id="registerMsg" style="margin-top:0.8rem; text-align:center; font-size:0.85rem; min-height:1.2rem;"></div>
            <p style="margin-top:0.8rem; text-align:center; color:var(--gray); font-size:0.85rem;">
                已有帳戶？<a href="javascript:void(0)" onclick="openLoginModal()"
                            style="color:var(--accent); font-weight:500;">立即登入</a>
            </p>
        </div>
    </div>

    <!-- 登录弹窗 -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeLoginModal()" aria-label="關閉">&times;</button>
            <h3 style="margin-bottom:1.5rem; color:var(--primary); text-align:center;">
                <i class="fas fa-sign-in-alt" style="color:var(--gold); margin-right:0.5rem;"></i>歡迎回來
            </h3>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div style="margin-bottom:0.8rem;">
                    <label style="display:block; margin-bottom:0.25rem; font-weight:500; font-size:0.9rem;">用戶名 *</label>
                    <input type="text" name="username" required maxlength="50" placeholder="請輸入註冊時的用戶名"
                           style="width:100%; padding:0.6rem; border:2px solid #e9ecef; border-radius:8px; font-size:0.9rem;">
                </div>
                <div style="margin-bottom:1rem; position:relative;">
                    <label style="display:block; margin-bottom:0.25rem; font-weight:500; font-size:0.9rem;">密碼 *</label>
                    <input type="password" name="password" id="loginPassword" required minlength="6" placeholder="請輸入密碼"
                           style="width:100%; padding:0.6rem; border:2px solid #e9ecef; border-radius:8px; font-size:0.9rem; padding-right:2.5rem;">
                    <i class="fas fa-eye password-toggle" id="toggleLoginPassword"
                       onclick="togglePassword('loginPassword', this)" aria-label="切換密碼可見性"></i>
                </div>
                <button type="submit" class="btn btn-primary"
                        style="width:100%; justify-content:center; padding:0.7rem;">
                    <i class="fas fa-sign-in-alt"></i> 立即登入
                </button>
            </form>
            <div id="loginMsg" style="margin-top:0.8rem; text-align:center; font-size:0.85rem; min-height:1.2rem;"></div>
            <p style="margin-top:0.8rem; text-align:center; color:var(--gray); font-size:0.85rem;">
                還沒有帳戶？<a href="javascript:void(0)" onclick="switchToRegister()"
                              style="color:var(--accent); font-weight:500;">立即註冊</a>
            </p>
        </div>
    </div>
</div>

<!-- ==================== 登录注册 JS Fragment ==================== -->
<script th:fragment="login-register-js">
    // ===== 弹窗控制 =====
    function openRegisterModal() {
        const modal = document.getElementById('registerModal');
        if (!modal) return;
        modal.style.display = 'flex';
        document.getElementById('registerMsg').textContent = '';
        document.getElementById('registerForm').reset();
        document.body.style.overflow = 'hidden';
    }
    function closeRegisterModal() {
        const modal = document.getElementById('registerModal');
        if (!modal) return;
        modal.style.display = 'none';
        document.body.style.overflow = '';
    }
    function openLoginModal() {
        const modal = document.getElementById('loginModal');
        if (!modal) return;
        modal.style.display = 'flex';
        document.getElementById('loginMsg').textContent = '';
        document.getElementById('loginForm')?.reset();
        document.body.style.overflow = 'hidden';
    }
    function closeLoginModal() {
        const modal = document.getElementById('loginModal');
        if (!modal) return;
        modal.style.display = 'none';
        document.body.style.overflow = '';
    }

    // 点击遮罩层关闭弹窗
    document.addEventListener('DOMContentLoaded', function () {
        const registerModal = document.getElementById('registerModal');
        const loginModal = document.getElementById('loginModal');
        if (registerModal) {
            registerModal.addEventListener('click', function (e) {
                if (e.target === this) closeRegisterModal();
            });
        }
        if (loginModal) {
            loginModal.addEventListener('click', function (e) {
                if (e.target === this) closeLoginModal();
            });
        }
    });

    // ESC 键关闭弹窗
    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
            closeRegisterModal();
            closeLoginModal();
        }
    });

    // 密码可见性切换
    function togglePassword(inputId, icon) {
        const input = document.getElementById(inputId);
        if (!input) return;
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    function switchToRegister() {
        closeLoginModal();
        setTimeout(openRegisterModal, 200);
    }

    // 注册提交
    async function handleRegister(e) {
        e.preventDefault();
        const form = e.target;
        const msg = document.getElementById('registerMsg');
        const btn = form.querySelector('button[type="submit"]');
        if (form.password.value !== form.confirmPassword.value) {
            msg.textContent = ' 兩次密碼輸入不一致';
            msg.style.color = 'var(--accent)';
            form.confirmPassword.focus();
            return;
        }
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 註冊中...';
        msg.textContent = '';
        try {
            const formData = {
                username: form.username.value.trim(),
                name: form.name.value.trim(),
                email: form.email.value.trim(),
                password: form.password.value,
                phone: form.phone.value.trim()
            };
            const response = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });
            const result = await response.json();
            if (response.ok) {
                msg.textContent = '✅ 註冊成功！3秒後自動登入...';
                msg.style.color = 'green';
                setTimeout(() => {
                    closeRegisterModal();
                    openLoginModal();
                    const loginForm = document.getElementById('loginForm');
                    if (loginForm) {
                        loginForm.username.value = formData.username;
                        loginForm.password.focus();
                    }
                }, 2500);
            } else {
                msg.textContent = '❌ ' + (result.message || '註冊失敗，請重試');
                msg.style.color = 'var(--accent)';
            }
        } catch (error) {
            msg.textContent = '❌ 網絡錯誤，請檢查連接';
            msg.style.color = 'var(--accent)';
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-user-check"></i> 立即註冊';
        }
    }

    // 登录提交
    async function handleLogin(e) {
        e.preventDefault();
        const form = e.target;
        const msg = document.getElementById('loginMsg');
        const btn = form.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 登入中...';
        msg.textContent = '';
        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: form.username.value.trim(),
                    password: form.password.value
                })
            });
            const result = await response.json();
            if (response.ok) {
                msg.textContent = '✅ 登入成功！正在刷新...';
                msg.style.color = 'green';
                setTimeout(() => {
                    closeLoginModal();
                    window.location.reload();
                }, 1200);
            } else {
                msg.textContent = '❌ ' + (result.message || '用戶名或密碼錯誤');
                msg.style.color = 'var(--accent)';
            }
        } catch (error) {
            msg.textContent = '❌ 網絡錯誤，請檢查連接';
            msg.style.color = 'var(--accent)';
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> 立即登入';
        }
    }
</script>

</body>
</html>
