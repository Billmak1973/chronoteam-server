<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!-- ==================== 公共导航栏 ==================== -->
<nav th:fragment="navbar" class="navbar">
    <a href="/" class="logo"><i class="fas fa-stopwatch"></i> ChronoTeam</a>
    <div class="nav-links">
        <a href="/browse"><i class="fas fa-search"></i> 瀏覽商品</a>
        <a href="javascript:void(0)" onclick="requireLogin('/sell', '❌ 請先登入後再發佈出售！')" class="btn btn-gold">
            <i class="fas fa-plus-circle"></i> 發佈出售
        </a>

        <!-- 未登录 -->
        <a href="javascript:void(0)" th:if="${#authorization.expression('!isAuthenticated()')}" onclick="openLoginModal()"><i class="fas fa-sign-in-alt"></i> 登入</a>
        <a href="javascript:void(0)" th:if="${#authorization.expression('!isAuthenticated()')}" onclick="openRegisterModal()"><i class="fas fa-user-plus"></i> 註冊</a>

        <!-- 已登录：用户下拉菜单 -->
        <div th:if="${#authorization.expression('isAuthenticated()')}" class="nav-dropdown">
            <a href="javascript:void(0)" class="nav-dropdown-trigger">
                <i class="fas fa-user-circle"></i> 我的帳戶 <i class="fas fa-caret-down" style="font-size: 0.8rem;"></i>
            </a>
            <div class="nav-dropdown-menu">
                <div class="user-header">
                    <i class="fas fa-user-circle" style="font-size: 1.5rem;"></i>
                    <div class="username" sec:authentication="name">用戶名</div>
                </div>

                <a href="/account/dashboard"><i class="fas fa-user-cog"></i> 個人中心</a>

                <a href="/admin/dashboard" th:if="${#authorization.expression('isAuthenticated()') and #authentication.name == 'admin'}"
                   style="background: linear-gradient(135deg, var(--gold) 0%, #b8972b 100%); color: var(--primary); font-weight: 600;">
                    <i class="fas fa-shield-alt"></i> 管理中心
                </a>

                <a href="/account/reviews" style="text-decoration: none; color: inherit; position: relative;">
                    <i class="fas fa-envelope"></i> 消息通知
                    <span id="notificationBadge" class="cart-badge" style="display:none; position: absolute; top: -5px; right: -5px; font-size: 10px; padding: 2px 5px; background: #dc3545;">0</span>
                </a>

                <a href="/account/notifications" style="text-decoration: none; color: inherit; position: relative;">
                    <i class="fas fa-bell"></i> 系统通知
                    <span id="systemNotificationBadge" class="cart-badge" style="display:none; position: absolute; top: -5px; right: -5px; font-size: 10px; padding: 2px 5px; background: #ffc107; color: #212529;">0</span>
                </a>

                <button type="button" class="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> 登出</button>
                <button type="button" class="delete-account-btn" onclick="return false;"><i class="fas fa-user-slash"></i> 註銷賬戶</button>
            </div>
        </div>

        <!-- 购物车下拉菜单 -->
        <div class="nav-dropdown">
            <a href="javascript:void(0)" class="nav-dropdown-trigger" onclick="toggleCartDropdown(event)">
                <i class="fas fa-shopping-cart"></i> 購物車
                <span id="cartCountBadge" class="cart-badge" style="display:none;">0</span>
            </a>
            <div class="nav-dropdown-menu cart-dropdown-menu" id="cartDropdown">
                <div class="cart-header"><h3><i class="fas fa-shopping-cart"></i> 購物車</h3></div>
                <div class="cart-items-container" id="cartItemsContainer">
                    <div class="cart-empty"><i class="fas fa-shopping-basket" style="font-size: 3rem; color: #ddd; margin-bottom: 1rem;"></i><p>購物車是空的</p></div>
                </div>
                <div class="cart-footer">
                    <div class="cart-total"><span>總計：</span><span id="cartTotalAmount" style="color: var(--accent); font-weight: 700; font-size: 1.2rem;">HK$ 0</span></div>
                    <a href="/cart/view" class="btn btn-outline" style="margin-bottom: 1rem; width: 100%; text-align: center;">
                        <i class="fas fa-shopping-basket"></i> 查看購物車
                    </a>
                    <button class="btn btn-primary checkout-btn" onclick="checkout()"><i class="fas fa-credit-card"></i> 結賬</button>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- ==================== 登录/注册弹窗 ==================== -->
<div th:fragment="modals">
    <!-- 注册弹窗 -->
    <div id="registerModal" class="modal">
        <div class="modal-content" style="max-height: 90vh; overflow-y: auto;">
            <button class="modal-close" onclick="closeRegisterModal()" aria-label="關閉">&times;</button>
            <h3 style="margin-bottom:1.2rem; color:var(--primary); text-align:center; font-size:1.3rem;"><i class="fas fa-user-plus" style="color:var(--gold); margin-right:0.5rem;"></i>創建新帳戶</h3>
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div style="margin-bottom:0.8rem;"><label style="display:block; margin-bottom:0.25rem; font-weight:500; font-size:0.9rem;">用戶名 *</label><input type="text" name="username" required maxlength="50" placeholder="3-50位，字母數字組合" style="width:100%; padding:0.6rem; border:2px solid #e9ecef; border-radius:8px; font-size:0.9rem;"></div>
                <div style="margin-bottom:0.8rem;"><label style="display:block; margin-bottom:0.25rem; font-weight:500; font-size:0.9rem;">真實姓名 *</label><input type="text" name="name" required maxlength="100" placeholder="請輸入您的真實姓名" style="width:100%; padding:0.6rem; border:2px solid #e9ecef; border-radius:8px; font-size:0.9rem;"></div>
                <div style="margin-bottom:0.8rem;"><label style="display:block; margin-bottom:0.25rem; font-weight:500; font-size:0.9rem;">電子郵件 *</label><input type="email" name="email" required maxlength="100" placeholder="example@email.com" style="width:100%; padding:0.6rem; border:2px solid #e9ecef; border-radius:8px; font-size:0.9rem;"></div>
                <div style="margin-bottom:0.8rem; position:relative;"><label style="display:block; margin-bottom:0.25rem; font-weight:500; font-size:0.9rem;">密碼 *</label><input type="password" name="password" id="regPassword" required minlength="6" placeholder="至少6位字符" style="width:100%; padding:0.6rem; border:2px solid #e9ecef; border-radius:8px; font-size:0.9rem; padding-right:2.5rem;"><i class="fas fa-eye password-toggle" id="toggleRegPassword" onclick="togglePassword('regPassword', this)" aria-label="切換密碼可見性"></i></div>
                <div style="margin-bottom:0.8rem;"><label style="display:block; margin-bottom:0.25rem; font-weight:500; font-size:0.9rem;">確認密碼 *</label><input type="password" name="confirmPassword" id="confirmPassword" required minlength="6" placeholder="請再次輸入密碼" style="width:100%; padding:0.6rem; border:2px solid #e9ecef; border-radius:8px; font-size:0.9rem;"></div>
                <div style="margin-bottom:1.2rem;"><label style="display:block; margin-bottom:0.25rem; font-weight:500; font-size:0.9rem;">手機號碼 *</label><input type="tel" name="phone" required maxlength="20" placeholder="例如: +852 1234 5678" style="width:100%; padding:0.6rem; border:2px solid #e9ecef; border-radius:8px; font-size:0.9rem;"></div>

                <!-- ==================== 家庭地址與區域選擇 ==================== -->
                <div style="margin-bottom:0.8rem;">
                    <label style="display:block; margin-bottom:0.25rem; font-weight:500; font-size:0.9rem;">家庭地址</label>

                    <!-- 新增：区域选择容器 -->
                    <div style="margin-bottom: 0.5rem;">
                        <div style="display: flex; gap: 10px;">
                            <!-- 第一级：大区域 -->
                            <select id="regionSelect" style="flex: 1; padding: 0.6rem; border: 2px solid #e9ecef; border-radius: 8px; font-size: 0.9rem; background: white;">
                                <option value="">请选择区域</option>
                                <option value="港岛">港岛</option>
                                <option value="九龙">九龙</option>
                                <option value="新界">新界</option>
                            </select>

                            <!-- 第二级：行政区 (初始禁用) -->
                            <select id="districtSelect" disabled style="flex: 2; padding: 0.6rem; border: 2px solid #e9ecef; border-radius: 8px; font-size: 0.9rem; background: #f8f9fa;">
                                <option value="">请先选择区域</option>
                            </select>
                        </div>
                        <small style="color: #6c757d; font-size: 0.75rem; margin-top: 0.2rem; display: block;">
                            <i class="fas fa-info-circle"></i> 选择区域后，详细地址将自动填入下方
                        </small>
                    </div>

                    <!-- 原有的详细地址输入框 -->
                    <input type="text" name="address" id="regAddress" placeholder="例如：九龙尖沙咀弥敦道..."
                           style="width:100%; padding:0.6rem; border:2px solid #e9ecef; border-radius:8px; font-size:0.9rem;">
                    <small style="color: var(--gray); font-size: 0.75rem; margin-top: 0.2rem; display: block;">
                        <i class="fas fa-info-circle"></i> 非必要填写，但会影响上门送货地址确认
                    </small>
                </div>
                <!-- ========================================================== -->

                <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:0.7rem;"><i class="fas fa-user-check"></i> 立即註冊</button>
            </form>
            <div id="registerMsg" style="margin-top:0.8rem; text-align:center; font-size:0.85rem; min-height:1.2rem;"></div>
            <p style="margin-top:0.8rem; text-align:center; color:var(--gray); font-size:0.85rem;">已有帳戶？<a href="javascript:void(0)" onclick="openLoginModal()" style="color:var(--accent); font-weight:500;">立即登入</a></p>
        </div>
    </div>

    <!-- 登录弹窗 -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeLoginModal()" aria-label="關閉">&times;</button>
            <h3 style="margin-bottom:1.5rem; color:var(--primary); text-align:center;"><i class="fas fa-sign-in-alt" style="color:var(--gold); margin-right:0.5rem;"></i>歡迎回來</h3>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div style="margin-bottom:0.8rem;"><label style="display:block; margin-bottom:0.25rem; font-weight:500; font-size:0.9rem;">用戶名 *</label><input type="text" name="username" required maxlength="50" placeholder="請輸入註冊時的用戶名" style="width:100%; padding:0.6rem; border:2px solid #e9ecef; border-radius:8px; font-size:0.9rem;"></div>
                <div style="margin-bottom:1rem; position:relative;"><label style="display:block; margin-bottom:0.25rem; font-weight:500; font-size:0.9rem;">密碼 *</label><input type="password" name="password" id="loginPassword" required minlength="6" placeholder="請輸入密碼" style="width:100%; padding:0.6rem; border:2px solid #e9ecef; border-radius:8px; font-size:0.9rem; padding-right:2.5rem;"><i class="fas fa-eye password-toggle" id="toggleLoginPassword" onclick="togglePassword('loginPassword', this)" aria-label="切換密碼可見性"></i></div>
                <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:0.7rem;"><i class="fas fa-sign-in-alt"></i> 立即登入</button>
            </form>
            <div id="loginMsg" style="margin-top:0.8rem; text-align:center; font-size:0.85rem; min-height:1.2rem;"></div>
            <p style="margin-top:0.8rem; text-align:center; color:var(--gray); font-size:0.85rem;">還沒有帳戶？<a href="javascript:void(0)" onclick="switchToRegister()" style="color:var(--accent); font-weight:500;">立即註冊</a></p>
        </div>
    </div>

    <!-- 自定义登出确认弹窗 -->
    <div id="logoutModal" class="custom-modal-overlay" style="display: none;">
        <div class="custom-modal-box logout-modal-content">
            <div class="modal-icon warning-icon" style="color: var(--gold);">
                <i class="fas fa-sign-out-alt"></i>
            </div>
            <h3 class="modal-title" style="color: var(--primary); margin-bottom: 0.5rem;">确认登出？</h3>
            <p class="modal-message" style="color: var(--gray); margin-bottom: 2rem;">您确定要退出当前账户吗？</p>
            <div class="modal-actions" style="display: flex; gap: 1rem; justify-content: center;">
                <button class="btn-cancel" onclick="closeLogoutModal()" style="padding: 0.6rem 1.5rem; background: #e9ecef; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; color: var(--primary);">
                    取消
                </button>
                <button class="btn-confirm" onclick="performLogout()" style="padding: 0.6rem 1.5rem; background: var(--gold); border: none; border-radius: 6px; cursor: pointer; font-weight: 600; color: var(--primary);">
                    确认登出
                </button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
