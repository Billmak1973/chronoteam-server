<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的寄售商品 - ChronoTeam</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/sidebar.css">
    <style>
        /* 佈局相關 */
        .dashboard-container { display: flex; min-height: calc(100vh - 150px); max-width: 1400px; margin: 2rem auto; padding: 0 1rem; gap: 2rem; }
        .main-content { flex: 1; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 2.5rem; }
        .page-title { font-size: 1.8rem; color: var(--primary); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.8rem; border-bottom: 2px solid var(--light); padding-bottom: 1rem; }
        .page-title i { color: var(--gold); }
        .page-subtitle { color: var(--gray); margin-bottom: 2rem; font-size: 0.95rem; }

        /* 統計卡片 */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: white; padding: 1.5rem; border-radius: 12px; display: flex; align-items: center; gap: 1rem; transition: transform 0.3s; }
        .stat-card:hover { transform: translateY(-3px); }
        .stat-card i { font-size: 2rem; color: var(--gold); opacity: 0.8; }
        .stat-info h4 { margin: 0; font-size: 1.5rem; font-weight: 700; }
        .stat-info p { margin: 0; font-size: 0.85rem; opacity: 0.8; }

        /* 寄售卡片 */
        .consignment-card { background: white; border: 1px solid #e9ecef; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; transition: all 0.3s; display: flex; gap: 1.5rem; align-items: center; }
        .consignment-card:hover { box-shadow: 0 8px 25px rgba(0,0,0,0.08); transform: translateY(-2px); }

        .item-img { width: 100px; height: 100px; background: var(--light); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
        .item-img i { font-size: 2.5rem; color: #ccc; }

        .item-info { flex: 1; }
        .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; }
        .item-title { font-size: 1.2rem; font-weight: 600; color: var(--primary); display: flex; align-items: center; gap: 0.5rem; }

        .item-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; color: var(--gray); font-size: 0.9rem; margin-bottom: 1rem; }
        .item-details .detail-item { display: flex; flex-direction: column; }
        .item-details .detail-label { font-size: 0.8rem; color: #999; margin-bottom: 0.2rem; }
        .item-details .detail-value { font-weight: 600; color: var(--primary); font-size: 1rem; }
        .item-details .detail-value.price { color: var(--accent); font-size: 1.1rem; }
        .item-details .detail-value.profit { color: #28a745; font-size: 1.1rem; }

        /* 狀態標籤 */
        .status-badge { padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .status-ACCEPTED { background: #d1ecf1; color: #0c5460; }
        .status-COMPLETED { background: #d4edda; color: #155724; }
        .status-CANCELLED, .status-PENDING { background: #e2e3e5; color: #383d41; }

        .item-actions { display: flex; flex-direction: column; gap: 0.5rem; flex-shrink: 0; }
        .btn-sm { padding: 0.5rem 1rem; font-size: 0.85rem; border-radius: 6px; text-decoration: none; cursor: pointer; border: none; transition: 0.3s; display: inline-flex; align-items: center; gap: 0.4rem; justify-content: center; }
        .btn-view { background: var(--light); color: var(--primary); border: 1px solid #ddd; }
        .btn-view:hover { background: var(--gold); color: white; border-color: var(--gold); }

        /* 取消/下架按鈕樣式 */
        .btn-cancel-action { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .btn-cancel-action:hover { background: #f1aeb5; color: #491217; }

        /* 🟢 徹底刪除按鈕樣式 */
        .btn-delete-action { background: transparent; color: #dc3545; border: 1px solid #dc3545; }
        .btn-delete-action:hover { background: #dc3545; color: white; }

        .empty-state { text-align: center; padding: 4rem 2rem; }
        .empty-state i { font-size: 4rem; color: #ddd; margin-bottom: 1rem; }

        .footer { background: var(--primary); color: rgba(255, 255, 255, 0.7); padding: 2rem; text-align: center; margin-top: 3rem; }

        @media (max-width: 900px) {
            .dashboard-container { flex-direction: column; }
            .consignment-card { flex-direction: column; align-items: flex-start; }
            .item-actions { flex-direction: row; width: 100%; flex-wrap: wrap; }
            .item-actions .btn-sm { flex: 1; min-width: 120px; }
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/common :: navbar}"></div>

<div class="dashboard-container">
    <div th:replace="~{fragments/sidebar :: sidebar(activePage='consignment')}"></div>

    <main class="main-content">
        <h2 class="page-title"><i class="fas fa-store"></i> 我的寄售商品</h2>
        <p class="page-subtitle">查看您委託平台代售的手錶狀態、當前報價及成交進度</p>

        <!-- 統計卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-tags"></i>
                <div class="stat-info">
                    <h4 th:text="${onSaleCount}">0</h4>
                    <p>上架寄售中</p>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-check-circle"></i>
                <div class="stat-info">
                    <h4 th:text="${soldCount}">0</h4>
                    <p>已成功售出</p>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-dollar-sign"></i>
                <div class="stat-info">
                    <h4 th:text="'HK$ ' + ${#numbers.formatDecimal(totalProfit, 1, 'COMMA', 0, 'POINT')}">HK$ 0</h4>
                    <p>累計已結算收益</p>
                </div>
            </div>
        </div>

        <!--  寄售列表 -->
        <div th:if="${!consignmentApps.isEmpty()}">
            <div class="consignment-card" th:each="app : ${consignmentApps}">
                <div class="item-img">
                    <i class="fas fa-clock"></i>
                </div>
                <div class="item-info">
                    <div class="item-header">
                        <div class="item-title">
                            <span th:text="${app.brand}">Rolex</span> - <span th:text="${app.series}">Submariner</span>
                            <span class="status-badge"
                                  th:classappend="${app.statusClass}"
                                  th:text="${app.statusText}">寄售中</span>
                        </div>
                    </div>
                    <div class="item-details">
                        <div class="detail-item">
                            <span class="detail-label">型號</span>
                            <span class="detail-value" th:text="${app.model} ?: '未填寫'">-</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">寄售報價</span>
                            <span class="detail-value price" th:if="${app.displayPrice != null}"
                                  th:text="'HK$ ' + ${#numbers.formatDecimal(app.displayPrice, 1, 'COMMA', 0, 'POINT')}">HK$ 0</span>
                            <span class="detail-value" th:if="${app.displayPrice == null}">待報價</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">平台服務費 (5%)</span>
                            <span class="detail-value" th:if="${app.serviceFee != null}"
                                  th:text="'- HK$ ' + ${#numbers.formatDecimal(app.serviceFee, 1, 'COMMA', 0, 'POINT')}">- HK$ 0</span>
                            <span class="detail-value" th:if="${app.serviceFee == null}">-</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">預估收益</span>
                            <span class="detail-value profit" th:if="${app.profit != null}"
                                  th:text="'HK$ ' + ${#numbers.formatDecimal(app.profit, 1, 'COMMA', 0, 'POINT')}">HK$ 0</span>
                            <span class="detail-value" th:if="${app.profit == null}">-</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">提交時間</span>
                            <span class="detail-value" th:text="${#temporals.format(app.createdAt, 'yyyy-MM-dd')}">-</span>
                        </div>
                    </div>
                </div>

                <!-- 操作按鈕區 -->
                <div class="item-actions">
                    <a href="javascript:void(0)" class="btn-sm btn-view" onclick="showNotification('🔍 詳細鑑定報告與商品頁面開發中')">
                        <i class="fas fa-eye"></i> 查看詳情
                    </a>

                    <!-- 1. 取消申請 (僅限 PENDING 或 QUOTED 狀態) -->
                    <button th:if="${app.status.name() == 'PENDING' or app.status.name() == 'QUOTED'}"
                            th:onclick="|cancelApplication(${app.applicationId})|"
                            class="btn-sm btn-cancel-action">
                        <i class="fas fa-times"></i> 取消申請
                    </button>

                    <!-- 2. 申請下架 (僅限 ACCEPTED 寄售中狀態) -->
                    <button th:if="${app.status.name() == 'ACCEPTED'}" class="btn-sm btn-cancel-action" onclick="showNotification('⚠️ 下架申請已提交，客服將在24小時內處理', true)">
                        <i class="fas fa-ban"></i> 申請下架
                    </button>

                    <!--  3. 徹底刪除記錄 (所有狀態皆可點擊，用於清理列表) -->
                    <button th:onclick="|deleteApplication(${app.applicationId})|"
                            class="btn-sm btn-delete-action">
                        <i class="fas fa-trash-alt"></i> 刪除記錄
                    </button>
                </div>
            </div>
        </div>

        <!--  空狀態 (已清理重複代碼) -->
        <div th:if="${consignmentApps.isEmpty()}" class="empty-state">
            <i class="fas fa-store-alt-slash"></i>
            <h3 style="color: var(--primary); margin-bottom: 0.5rem;">您還沒有寄售中的商品</h3>
            <p style="color: var(--gray); margin-bottom: 1.5rem;">立即發佈出售申請並選擇「平台代為寄售」，讓您的愛錶獲得更好的價格！</p>
            <a href="/sell" class="btn btn-gold"><i class="fas fa-plus-circle"></i> 發佈出售申請</a>
        </div>
    </main>
</div>

<footer class="footer">
    <p>&copy; <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy')}">2026</span> ChronoTeam. All Rights Reserved.</p>
</footer>

<div th:replace="~{fragments/common :: modals}"></div>
<script th:inline="javascript">
    const isLoggedIn = [[${#authorization.expression('isAuthenticated()')} ?: false]];
</script>
<script src="/js/common.js"></script>

<script>
    // 1. 取消申請 (改變狀態為 CANCELLED)
    async function cancelApplication(applicationId) {
        if (!confirm('⚠️ 確定要取消此寄售申請嗎？\n\n取消後，該申請將被標記為已取消狀態。')) {
            return;
        }

        try {
            const response = await fetch(`/sell/cancel/${applicationId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });

            const result = await response.json();

            if (response.ok && result.success) {
                showNotification('✅ 申請已取消');
                setTimeout(() => location.reload(), 1000);
            } else {
                showNotification('❌ ' + (result.message || '取消失敗'), true);
            }
        } catch (error) {
            console.error('取消申請錯誤:', error);
            showNotification('❌ 網絡錯誤，請稍後重試', true);
        }
    }

    // 🟢 2. 徹底刪除申請記錄 (物理刪除，從數據庫和列表中徹底消失)
    async function deleteApplication(applicationId) {
        if (!confirm('⚠️ 確定要【徹底刪除】此申請記錄嗎？\n\n此操作無法恢復，記錄將從您的列表中永久消失！')) {
            return;
        }

        try {
            const response = await fetch(`/sell/delete/${applicationId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });

            const result = await response.json();

            if (response.ok && result.success) {
                showNotification('✅ 記錄已徹底刪除');
                setTimeout(() => location.reload(), 1000);
            } else {
                showNotification('❌ ' + (result.message || '刪除失敗'), true);
            }
        } catch (error) {
            console.error('刪除錯誤:', error);
            showNotification('❌ 網絡錯誤，請稍後重試', true);
        }
    }
</script>
</body>
</html>
