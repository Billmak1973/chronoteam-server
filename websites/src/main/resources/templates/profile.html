
<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帳戶信息 - ChronoTeam</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!--  1. 引入公共 CSS -->
    <link rel="stylesheet" href="/css/common.css">
    <!--  2. 引入側邊欄專屬 CSS -->
    <link rel="stylesheet" href="/css/sidebar.css">

    <!--  3. 頁面特有 CSS -->
    <style>
        /*  佈局相關 (與 dashboard / password 頁面保持一致) */
        .dashboard-container {
            display: flex;
            min-height: calc(100vh - 150px);
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1rem;
            gap: 2rem;
        }
        .main-content {
            flex: 1;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 2.5rem;
        }

        /* 頁面專屬樣式 */
        h2 {
            color: var(--primary);
            border-bottom: 3px solid var(--gold);
            padding-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .info-card { margin-top: 1.5rem; }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px dashed #e9ecef;
        }

        .info-label {
            font-weight: 600;
            color: #6c757d;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .info-value {
            color: var(--primary);
            font-weight: 500;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 2rem;
            padding: 0.7rem 1.5rem;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: var(--gold);
            color: var(--primary);
            transform: translateY(-2px);
        }

        /* 響應式優化 */
        @media (max-width: 900px) {
            .dashboard-container { flex-direction: column; }
        }
        @media (max-width: 768px) {
            .main-content { padding: 1.5rem; }
            .info-row { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
        }
    </style>
</head>
<body>

<!--  引入公共导航栏 -->
<div th:replace="~{fragments/common :: navbar}"></div>

<!--  4. 使用 Flex 佈局容器 -->
<div class="dashboard-container">

    <!--  5. 引入側邊欄 Fragment，並傳入 activePage='profile' 以高亮「帳戶信息」菜單 -->
    <div th:replace="~{fragments/sidebar :: sidebar(activePage='profile')}"></div>

    <!--  6. 右側主內容 (取代原本的 page-container) -->
    <main class="main-content">
        <h2><i class="fas fa-id-card" style="color: var(--gold);"></i> 帳戶信息</h2>

        <div class="info-card">
            <div class="info-row">
                <span class="info-label"><i class="fas fa-user"></i> 用戶名</span>
                <span class="info-value" th:text="${customer.username}">username</span>
            </div>
            <div class="info-row">
                <span class="info-label"><i class="fas fa-envelope"></i> 電子郵件</span>
                <span class="info-value" th:text="${customer.email}">user@example.com</span>
            </div>
            <div class="info-row">
                <span class="info-label"><i class="fas fa-phone"></i> 手機號碼</span>
                <span class="info-value" th:text="${customer.phone}">+852 1234 5678</span>
            </div>
            <div class="info-row">
                <span class="info-label"><i class="fas fa-credit-card"></i> 信用額度</span>
                <span class="info-value" style="color: var(--gold); font-weight: 700;"
                      th:text="'HK$ ' + ${#numbers.formatDecimal(customer.creditLimit, 1, 'COMMA', 2, 'POINT')}">HK$ 5,000.00</span>
            </div>
        </div>

        <a href="/" class="btn-back"><i class="fas fa-arrow-left"></i> 返回首頁</a>
    </main>
</div>

<!--  引入公共弹窗 HTML -->
<div th:replace="~{fragments/common :: modals}"></div>

<!--  注入登录状态变量 -->
<script th:inline="javascript">
    const isLoggedIn = [[${#authorization.expression('isAuthenticated()')} ?: false]];
</script>

<!--  引入公共 JS -->
<script src="/js/common.js"></script>

</body>
</html>
