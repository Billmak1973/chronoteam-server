<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系統通知 - ChronoTeam</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/sidebar.css">
  <style>
    .dashboard-container { display: flex; min-height: calc(100vh - 150px); max-width: 1400px; margin: 2rem auto; padding: 0 1rem; gap: 2rem; }
    .main-content { flex: 1; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 2.5rem; }
    .page-title { font-size: 1.8rem; color: var(--primary); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.8rem; border-bottom: 2px solid var(--light); padding-bottom: 1rem; }
    .page-title i { color: var(--gold); }

    /*  Tab 切換樣式 */
    .notification-tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 2px solid #e9ecef;
    }
    .tab-btn {
      padding: 1rem 2rem;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--gray);
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: -2px;
    }
    .tab-btn:hover { color: var(--primary); }
    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--gold);
    }

    /* 通知卡片樣式 */
    .notification-list { display: flex; flex-direction: column; gap: 1rem; }
    .notification-card {
        background: white; border: 1px solid #e9ecef; border-radius: 10px;
        padding: 1.5rem; transition: all 0.3s; position: relative; overflow: hidden;
    }
    .notification-card:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.05); transform: translateY(-2px); }
    .notification-card.unread { border-left: 4px solid var(--accent); background: #fff9fa; }
    .notification-card.stock-notif { border-left-color: var(--gold); background: #fffef5; }

    .notif-header { display: flex; justify-content: space-between; margin-bottom: 0.8rem; }
    .notif-title { font-weight: 700; color: var(--primary); font-size: 1.1rem; display: flex; align-items: center; gap: 0.5rem; }
    .notif-date { color: var(--gray); font-size: 0.85rem; }

    .notif-content { color: #555; line-height: 1.6; margin-bottom: 1rem; }

    /* 刪除原因專屬樣式 */
    .delete-reason-box {
        background: #fff3cd; border: 1px solid #ffeeba; border-radius: 8px;
        padding: 1rem; margin-top: 0.5rem; color: #856404;
    }
    .delete-reason-box strong { display: block; margin-bottom: 0.3rem; color: #664d03; }
    .deleted-content-preview {
        margin-top: 0.8rem; padding: 0.8rem; background: rgba(0,0,0,0.03);
        border-radius: 6px; font-style: italic; font-size: 0.9rem; color: #666;
    }

    /* 到貨通知專屬樣式 */
    .stock-info {
        background: linear-gradient(135deg, #fff9e6 0%, #fff3cd 100%);
        border-left: 4px solid var(--gold);
        padding: 1rem;
        border-radius: 8px;
        margin-top: 0.5rem;
    }
    .stock-info strong { color: #856404; display: block; margin-bottom: 0.5rem; }
    .stock-info .product-name { color: var(--primary); font-weight: 600; }
    .stock-info .stock-count { color: var(--accent); font-weight: 700; }

    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--gray); }
    .empty-state i { font-size: 4rem; margin-bottom: 1rem; color: #ddd; }

    /* Tab 內容區域 */
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 900px) {
      .dashboard-container { flex-direction: column; }
      .notification-tabs { flex-direction: column; gap: 0.5rem; }
      .tab-btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
<div th:replace="~{fragments/common :: navbar}"></div>

<div class="dashboard-container">
  <!-- 側邊欄 -->
  <div th:replace="~{fragments/sidebar :: sidebar(activePage='notifications')}"></div>

  <main class="main-content">
    <h2 class="page-title"><i class="fas fa-bell"></i> 系統通知</h2>

    <!--  Tab 切換按鈕（移除了全部通知和數字徽章） -->
    <div class="notification-tabs">
      <button class="tab-btn" id="tab-btn-stock" onclick="switchTab('stock', this)">
        <i class="fas fa-bell" style="color: var(--gold);"></i>
        到貨通知
      </button>
      <button class="tab-btn" id="tab-btn-admin" onclick="switchTab('admin', this)">
        <i class="fas fa-exclamation-triangle" style="color: var(--accent);"></i>
        管理通知
      </button>
    </div>

    <!--  到貨通知 -->
    <div id="tab-stock" class="tab-content">
      <div th:if="${!stockNotifications.isEmpty()}" class="notification-list">
        <div th:each="notif : ${stockNotifications}"
             class="notification-card stock-notif"
             th:classappend="${!notif.read} ? 'unread' : ''">

          <div class="notif-header">
            <div class="notif-title">
              <i class="fas fa-bell" style="color: var(--gold);"></i>
              <span th:text="${notif.title}">您關注的商品已到貨！</span>
            </div>
            <div class="notif-date" th:text="${#temporals.format(notif.createdAt, 'yyyy-MM-dd HH:mm')}">2026-06-21</div>
          </div>

          <div class="notif-content" th:text="${notif.content}">您關注的 AP Royal Oak 15400ST 已補貨到庫...</div>

          <div class="stock-info">
            <strong><i class="fas fa-box-open"></i> 商品資訊</strong>
            <a th:href="${notif.targetUrl}" class="product-name" style="text-decoration: none; color: var(--primary);">
              <i class="fas fa-external-link-alt" style="font-size: 0.8rem; margin-right: 0.3rem;"></i>
              點擊查看商品詳情
            </a>
            <div style="margin-top: 0.5rem; font-size: 0.9rem;">
              <span class="stock-count"><i class="fas fa-check-circle"></i> 庫存充足，立即搶購！</span>
            </div>
          </div>
        </div>
      </div>
      <div th:if="${stockNotifications.isEmpty()}" class="empty-state">
        <i class="fas fa-bell-slash"></i>
        <h3>暫無到貨通知</h3>
        <p>當您關注的商品補貨時，這裡會收到通知</p>
      </div>
    </div>

    <!--  管理通知 -->
    <div id="tab-admin" class="tab-content">
      <div th:if="${!adminNotifications.isEmpty()}" class="notification-list">
        <div th:each="notif : ${adminNotifications}"
             class="notification-card"
             th:classappend="${!notif.read} ? 'unread' : ''">

          <div class="notif-header">
            <div class="notif-title">
              <i class="fas fa-exclamation-triangle" style="color: var(--accent);"></i>
              <span th:text="${notif.title}">您的評論已被移除</span>
            </div>
            <div class="notif-date" th:text="${#temporals.format(notif.createdAt, 'yyyy-MM-dd HH:mm')}">2026-06-20</div>
          </div>

          <div class="notif-content" th:text="${notif.content}">管理員對您的評論進行了處理。</div>

          <div th:if="${notif.deleteReason != null}" class="delete-reason-box">
            <strong><i class="fas fa-exclamation-triangle"></i> 管理員處理原因：</strong>
            <p th:text="${notif.deleteReason}" style="margin:0;">該內容不符合社區規範，因此被移除。</p>
            <div th:if="${notif.deletedContent != null}" class="deleted-content-preview">
              <i class="fas fa-quote-left"></i>
              <span th:text="${notif.deletedContent}">喜歡</span>
            </div>
          </div>
        </div>
      </div>
      <div th:if="${adminNotifications.isEmpty()}" class="empty-state">
        <i class="fas fa-shield-alt"></i>
        <h3>暫無管理通知</h3>
        <p>當您的評論被處理或帳戶有重要變動時，這裡會收到通知</p>
      </div>
    </div>

  </main>
</div>

<footer class="footer">
  <p>&copy; <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy')}">2026</span> ChronoTeam. All Rights Reserved.</p>
</footer>

<div th:replace="~{fragments/common :: modals}"></div>
<script th:inline="javascript">
  const isLoggedIn = [[${#authorization.expression('isAuthenticated()')} ?: false]];
  //  傳遞後端數據到前端
  const stockNotifications = /*[[${stockNotifications}]]*/ [];
  const adminNotifications = /*[[${adminNotifications}]]*/ [];
</script>
<script src="/js/common.js"></script>

<script>
  //  Tab 切換功能
  function switchTab(tabName, btn) {
    // 移除所有 active 類
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

    // 添加 active 到當前選中的 tab
    btn.classList.add('active');
    document.getElementById('tab-' + tabName).classList.add('active');
  }

  //  頁面加載時智能選擇默認 Tab
  document.addEventListener('DOMContentLoaded', function() {
    const stockBtn = document.getElementById('tab-btn-stock');
    const adminBtn = document.getElementById('tab-btn-admin');

    //  智能邏輯：
    // 1. 如果有到貨通知，默認顯示到貨通知
    // 2. 如果只有管理通知，默認顯示管理通知
    // 3. 如果兩個都有，優先顯示到貨通知
    // 4. 如果都沒有，默認顯示到貨通知

    const hasStockNotif = stockNotifications && stockNotifications.length > 0;
    const hasAdminNotif = adminNotifications && adminNotifications.length > 0;

    if (hasStockNotif) {
      // 有到貨通知，顯示到貨通知 tab
      switchTab('stock', stockBtn);
    } else if (hasAdminNotif) {
      // 只有管理通知，顯示管理通知 tab
      switchTab('admin', adminBtn);
    } else {
      // 都沒有，默認顯示到貨通知 tab
      switchTab('stock', stockBtn);
    }
  });
</script>
</body>
</html>
