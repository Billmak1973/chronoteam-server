<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系統通知 - ChronoTeam</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/sidebar.css">
  <style>
    .dashboard-container { display: flex; min-height: calc(100vh - 150px); max-width: 1400px; margin: 2rem auto; padding: 0 1rem; gap: 2rem; }
    .main-content { flex: 1; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 2.5rem; }
    .page-title { font-size: 1.8rem; color: var(--primary); margin-bottom: 2rem; display: flex; align-items: center; gap: 0.8rem; border-bottom: 2px solid var(--light); padding-bottom: 1rem; }
    .page-title i { color: var(--gold); }

    /* 通知卡片樣式 */
    .notification-list { display: flex; flex-direction: column; gap: 1rem; }
    .notification-card {
        background: white; border: 1px solid #e9ecef; border-radius: 10px;
        padding: 1.5rem; transition: all 0.3s; position: relative; overflow: hidden;
    }
    .notification-card:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.05); transform: translateY(-2px); }
    .notification-card.unread { border-left: 4px solid var(--accent); background: #fff9fa; }

    .notif-header { display: flex; justify-content: space-between; margin-bottom: 0.8rem; }
    .notif-title { font-weight: 700; color: var(--primary); font-size: 1.1rem; display: flex; align-items: center; gap: 0.5rem; }
    .notif-date { color: var(--gray); font-size: 0.85rem; }

    .notif-content { color: #555; line-height: 1.6; margin-bottom: 1rem; }

    /* 🟢 刪除原因專屬樣式 */
    .delete-reason-box {
        background: #fff3cd; border: 1px solid #ffeeba; border-radius: 8px;
        padding: 1rem; margin-top: 0.5rem; color: #856404;
    }
    .delete-reason-box strong { display: block; margin-bottom: 0.3rem; color: #664d03; }
    .deleted-content-preview {
        margin-top: 0.8rem; padding: 0.8rem; background: rgba(0,0,0,0.03);
        border-radius: 6px; font-style: italic; font-size: 0.9rem; color: #666;
    }

    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--gray); }
    .empty-state i { font-size: 4rem; margin-bottom: 1rem; color: #ddd; }
  </style>
</head>
<body>
<div th:replace="~{fragments/common :: navbar}"></div>

<div class="dashboard-container">
  <!-- 側邊欄 -->
  <div th:replace="~{fragments/sidebar :: sidebar(activePage='notifications')}"></div>

  <main class="main-content">
    <h2 class="page-title"><i class="fas fa-bell"></i> 系統通知</h2>

    <div th:if="${!notifications.isEmpty()}" class="notification-list">
      <div th:each="notif : ${notifications}"
           class="notification-card"
           th:classappend="${!notif.read} ? 'unread' : ''">

        <div class="notif-header">
          <div class="notif-title">
            <i class="fas fa-info-circle" style="color: var(--gold);"></i>
            <span th:text="${notif.title}">通知標題</span>
          </div>
          <div class="notif-date" th:text="${#temporals.format(notif.createdAt, 'yyyy-MM-dd HH:mm')}">2026-06-19</div>
        </div>

        <div class="notif-content" th:text="${notif.content}">通知內容摘要...</div>

        <!-- 🟢 核心：渲染刪除原因與被刪內容 -->
        <div th:if="${notif.deleteReason != null}" class="delete-reason-box">
          <strong><i class="fas fa-exclamation-triangle"></i> 管理員處理原因：</strong>
          <p th:text="${notif.deleteReason}" style="margin:0;">該內容不符合社區規範...</p>

          <div th:if="${notif.deletedContent != null}" class="deleted-content-preview">
            <i class="fas fa-quote-left"></i>
            <span th:text="${notif.deletedContent}">被刪除的評論原文...</span>
          </div>
        </div>
      </div>
    </div>

    <div th:if="${notifications.isEmpty()}" class="empty-state">
      <i class="fas fa-inbox"></i>
      <h3>暫無系統通知</h3>
      <p>當您的評論被處理或帳戶有重要變動時，這裡會收到通知。</p>
    </div>
  </main>
</div>

<footer class="footer">
  <p>&copy; <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy')}">2026</span> ChronoTeam. All Rights Reserved.</p>
</footer>

<div th:replace="~{fragments/common :: modals}"></div>
<script th:inline="javascript">const isLoggedIn = [[${#authorization.expression('isAuthenticated()')} ?: false]];</script>
<script src="/js/common.js"></script>
</body>
</html>
