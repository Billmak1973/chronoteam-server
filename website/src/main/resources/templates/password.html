<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密碼 - ChronoTeam</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/sidebar.css">

    <style>
        .dashboard-container { display: flex; min-height: calc(100vh - 150px); max-width: 1400px; margin: 2rem auto; padding: 0 1rem; gap: 2rem; }
        .main-content { flex: 1; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 2.5rem; }
        .page-title { font-size: 1.8rem; color: var(--primary); margin-bottom: 2rem; display: flex; align-items: center; gap: 0.8rem; border-bottom: 2px solid var(--light); padding-bottom: 1rem; }
        .page-title i { color: var(--gold); }

        /* 🔑 验证方式切换 */
        .verification-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--light);
        }
        .tab-btn {
            flex: 1;
            padding: 1rem;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            color: var(--gray);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .tab-btn:hover { color: var(--primary); background: var(--light); }
        .tab-btn.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
            background: rgba(212, 175, 55, 0.05);
        }
        .tab-btn i { font-size: 1.2rem; }

        /* 验证方式内容区 */
        .verification-content { display: none; }
        .verification-content.active { display: block; animation: fadeIn 0.3s ease; }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--primary); font-size: 0.95rem; }
        .form-group input, .form-group select { width: 100%; padding: 0.8rem 1rem; border: 2px solid #e9ecef; border-radius: 8px; font-size: 1rem; transition: all 0.3s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15); }
        .form-group .hint { font-size: 0.85rem; color: var(--gray); margin-top: 0.3rem; }

        /* 密码输入框容器 */
        .password-wrapper { position: relative; }
        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--gray);
            transition: color 0.3s;
            z-index: 10;
        }
        .password-toggle:hover { color: var(--primary); }

        .btn-submit {
            background: var(--gold);
            color: var(--primary);
            padding: 0.9rem 2rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            justify-content: center;
        }
        .btn-submit:hover { background: #b8972b; transform: translateY(-2px); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .footer { background: var(--primary); color: rgba(255, 255, 255, 0.7); padding: 2rem; text-align: center; margin-top: 3rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 900px) { .dashboard-container { flex-direction: column; } }
    </style>
</head>
<body>
<div th:replace="~{fragments/common :: navbar}"></div>

<div class="dashboard-container">
    <div th:replace="~{fragments/sidebar :: sidebar(activePage='password')}"></div>

    <main class="main-content">
        <h2 class="page-title"><i class="fas fa-key"></i> 修改密碼</h2>

        <!-- 🔑 验证方式切换 -->
        <div class="verification-tabs">
            <button type="button" class="tab-btn active" onclick="switchVerificationMethod('password', event)">
                <i class="fas fa-lock"></i>
                <span>使用當前密碼驗證</span>
            </button>
            <button type="button" class="tab-btn" onclick="switchVerificationMethod('question', event)">
                <i class="fas fa-question-circle"></i>
                <span>回答安全問題驗證</span>
            </button>
        </div>

        <form id="passwordForm" onsubmit="handleChangePassword(event)">
            <!-- 方式一：使用当前密码验证 -->
            <div id="passwordVerification" class="verification-content active">
                <div class="form-group">
                    <label for="currentPassword"><i class="fas fa-lock" style="margin-right: 0.5rem;"></i> 當前密碼</label>
                    <div class="password-wrapper">
                        <input type="password" id="currentPassword" name="currentPassword" required minlength="6" placeholder="請輸入當前密碼" style="padding-right: 2.5rem;">
                        <i class="fas fa-eye password-toggle" onclick="togglePasswordVisibility('currentPassword', this)" title="顯示/隱藏密碼"></i>
                    </div>
                    <div class="hint">為了帳戶安全，請先驗證當前密碼</div>
                </div>
            </div>

            <!-- 方式二：回答安全问题验证 (下拉选择) -->
            <div id="questionVerification" class="verification-content">
                <div class="form-group">
                    <label><i class="fas fa-shield-alt" style="margin-right: 0.5rem; color: var(--gold);"></i> 選擇並回答安全問題</label>
                    <div class="hint" style="margin-bottom: 1rem;">
                        <i class="fas fa-info-circle"></i>
                        請選擇一個您設置過的安全問題並回答，答案不區分大小寫。
                    </div>

                    <!-- 动态渲染区域 -->
                    <div id="questionsContainer">
                        <div style="text-align: center; padding: 2rem; color: var(--gray);">
                            <i class="fas fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 1rem;"></i>
                            <p>正在加載安全問題...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 新密码区域（两种方式共用） -->
            <div style="margin-top: 2rem; padding-top: 2rem; border-top: 2px solid var(--light);">
                <h3 style="margin-bottom: 1.5rem; color: var(--primary); display: flex; align-items: center; gap: 0.5rem;">
                    <i class="fas fa-key" style="color: var(--gold);"></i>
                    設置新密碼
                </h3>

                <div class="form-group">
                    <label for="newPassword"><i class="fas fa-lock" style="margin-right: 0.5rem;"></i> 新密碼</label>
                    <div class="password-wrapper">
                        <input type="password" id="newPassword" name="newPassword" required minlength="6" placeholder="請輸入新密碼" style="padding-right: 2.5rem;">
                        <i class="fas fa-eye password-toggle" onclick="togglePasswordVisibility('newPassword', this)" title="顯示/隱藏密碼"></i>
                    </div>
                    <div class="hint">密碼長度至少6位字符，建議使用字母+數字組合</div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword"><i class="fas fa-check-circle" style="margin-right: 0.5rem;"></i> 確認新密碼</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6" placeholder="請再次輸入新密碼" style="padding-right: 2.5rem;">
                        <i class="fas fa-eye password-toggle" onclick="togglePasswordVisibility('confirmPassword', this)" title="顯示/隱藏密碼"></i>
                    </div>
                    <div class="hint">請再次輸入新密碼以確認</div>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <i class="fas fa-save"></i> 保存新密碼
            </button>
        </form>
    </main>
</div>

<footer class="footer">
    <p>&copy; <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy')}">2026</span> ChronoTeam. All Rights Reserved.</p>
</footer>

<div th:replace="~{fragments/common :: modals}"></div>
<script th:inline="javascript">
    const isLoggedIn = [[${#authorization.expression('isAuthenticated()')} ?: false]];
</script>
<script src="/js/common.js"></script>

<script>
    let currentVerificationMethod = 'password'; // 'password' 或 'question'
    let selectedQuestionId = null; // 当前选中的问题ID

// 🔑 切換驗證方式
function switchVerificationMethod(method, event) {
    currentVerificationMethod = method;
    selectedQuestionId = null;

    // 1. 更新按鈕狀態
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    if (event && event.target) {
        event.target.closest('.tab-btn').classList.add('active');
    }

    // 2. 更新內容顯示
    document.querySelectorAll('.verification-content').forEach(content => content.classList.remove('active'));

    // 3. 獲取 currentPassword 輸入框
    const currentPasswordInput = document.getElementById('currentPassword');

    if (method === 'password') {
        document.getElementById('passwordVerification').classList.add('active');
        // 🟢 關鍵修復：顯示時恢復 required 屬性
        currentPasswordInput.setAttribute('required', 'required');
    } else {
        document.getElementById('questionVerification').classList.add('active');
        // 🟢 關鍵修復：隱藏時移除 required 屬性，防止瀏覽器原生驗證攔截
        currentPasswordInput.removeAttribute('required');

        // 載入安全問題
        loadSecurityQuestions();
        // 清除密碼輸入框的值
        currentPasswordInput.value = '';
    }
}

    // 🔑 加载安全问题 (智能渲染下拉框) - 🟢 修复版
    async function loadSecurityQuestions() {
        const container = document.getElementById('questionsContainer');
        try {
            const response = await fetch('/api/security/questions');
            const result = await response.json();

            console.log('📡 获取安全问题结果:', result); // 调试日志

            if (result.success && result.data && result.data.length > 0) {
                // 🟢 关键修复：确保设置默认选中的问题ID
                selectedQuestionId = result.data[0].id;
                console.log('✅ 默认选中问题ID:', selectedQuestionId); // 调试日志

                let html = '';

                // 如果有多于1个问题，显示下拉框
                if (result.data.length > 1) {
                    html += `
                        <div style="margin-bottom: 1.2rem;">
                            <label style="display: block; font-weight: 500; margin-bottom: 0.5rem; color: var(--gray); font-size: 0.9rem;">選擇安全問題</label>
                            <select id="questionSelect" onchange="changeSelectedQuestion(this.value)"
                                    style="width: 100%; padding: 0.8rem 1rem; border: 2px solid #e9ecef; border-radius: 8px; font-size: 1rem; background: white; cursor: pointer; transition: all 0.3s;">
                    `;
                    result.data.forEach((q, index) => {
                        // 🟢 第一个选项默认选中
                        const selected = index === 0 ? 'selected' : '';
                        html += `<option value="${q.id}" ${selected}>${q.question}</option>`;
                    });
                    html += `
                            </select>
                        </div>
                    `;
                } else {
                    // 只有1个问题，直接显示题目文本
                    html += `
                        <div style="background: var(--light); padding: 1rem; border-radius: 8px; margin-bottom: 1.2rem; border-left: 3px solid var(--gold);">
                            <strong style="color: var(--primary); font-size: 1rem;">
                                <i class="fas fa-question-circle" style="color: var(--gold); margin-right: 0.5rem;"></i>
                                ${result.data[0].question}
                            </strong>
                        </div>
                    `;
                }

                // 统一的答案输入框
                html += `
                    <div>
                        <label style="display: block; font-weight: 500; margin-bottom: 0.5rem; color: var(--gray); font-size: 0.9rem;">您的答案</label>
                        <div class="password-wrapper">
                            <input type="password"
                                   id="questionAnswerInput"
                                   placeholder="請輸入您的答案"
                                   style="padding-right: 2.5rem;">
                            <i class="fas fa-eye password-toggle"
                               onclick="toggleAnswerVisibility(this)"
                               title="顯示/隱藏答案"></i>
                        </div>
                    </div>
                `;

                container.innerHTML = html;
            } else {
                container.innerHTML = `
                    <div style="text-align: center; padding: 2rem; color: var(--accent);">
                        <i class="fas fa-exclamation-triangle" style="font-size: 2rem; margin-bottom: 1rem;"></i>
                        <p>您還未設置安全問題</p>
                        <p style="font-size: 0.9rem; margin-top: 0.5rem;">請先到「安全設置」頁面設置安全問題</p>
                        <a href="/account/security" class="btn btn-gold" style="margin-top: 1rem;">
                            <i class="fas fa-cog"></i> 前往設置
                        </a>
                    </div>
                `;
            }
        } catch (error) {
            console.error('❌ 加載安全問題失敗:', error);
            container.innerHTML = `
                <div style="text-align: center; padding: 2rem; color: var(--accent);">
                    <i class="fas fa-times-circle" style="font-size: 2rem; margin-bottom: 1rem;"></i>
                    <p>加載安全問題失敗，請重試</p>
                    <p style="font-size: 0.85rem; margin-top: 0.5rem;">錯誤：${error.message}</p>
                </div>
            `;
        }
    }

    // 🔑 切换下拉框选择的问题
    function changeSelectedQuestion(questionId) {
        selectedQuestionId = questionId;
        // 清空答案输入框并聚焦
        const answerInput = document.getElementById('questionAnswerInput');
        if (answerInput) {
            answerInput.value = '';
            answerInput.focus();
        }
    }

    // 🔑 切换答案可见性
    function toggleAnswerVisibility(icon) {
        const input = icon.previousElementSibling;
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }

    // 🔑 密码显示/隐藏切换
    function togglePasswordVisibility(inputId, icon) {
        const input = document.getElementById(inputId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }

    // 🔑 修改密码函数 - 🟢 修复版
    async function handleChangePassword(e) {
        e.preventDefault();

        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        // 验证两次新密码是否一致
        if (newPassword !== confirmPassword) {
            showNotification('❌ 兩次新密碼輸入不一致', true);
            return;
        }

        // 验证新密码与旧密码是否相同
        if (currentVerificationMethod === 'password') {
            const currentPassword = document.getElementById('currentPassword').value;
            if (currentPassword === newPassword) {
                showNotification('❌ 新密碼不能與舊密碼相同', true);
                return;
            }
        }

        // 准备请求数据
        const requestData = {
            newPassword: newPassword,
            verificationMethod: currentVerificationMethod
        };

        // 根据验证方式添加不同的验证信息
        if (currentVerificationMethod === 'password') {
            requestData.currentPassword = document.getElementById('currentPassword').value;
        } else {
            // 获取答案输入框
            const answerInput = document.getElementById('questionAnswerInput');

            // 🟢 关键修复：检查 selectedQuestionId 是否有效
            console.log('🔍 当前选中的问题ID:', selectedQuestionId);
            console.log('🔍 答案输入框:', answerInput);
            console.log('🔍 答案值:', answerInput ? answerInput.value : 'null');

            if (!selectedQuestionId) {
                showNotification('❌ 請選擇一個安全問題', true);
                return;
            }

            if (!answerInput || !answerInput.value.trim()) {
                showNotification('❌ 請輸入您選擇的安全問題答案', true);
                return;
            }

            // 只发送选中的那一个问题
            requestData.questionAnswers = [{
                questionId: selectedQuestionId,
                answer: answerInput.value.trim().toLowerCase()
            }];
        }

        console.log('📤 发送请求数据:', requestData); // 调试日志

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 處理中...';

        try {
            const response = await fetch('/api/account/change-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestData)
            });

            console.log('📥 响应状态:', response.status); // 调试日志
            const result = await response.json();
            console.log('📥 响应数据:', result); // 调试日志

            if (response.ok && result.success) {
                showNotification('✅ 密碼修改成功！請使用新密碼重新登入');
                setTimeout(() => {
                    fetch('/logout', { method: 'POST' }).then(() => {
                        window.location.href = '/';
                    });
                }, 2000);
            } else {
                const errorMsg = result.message || '密碼修改失敗，請檢查驗證信息是否正確';
                showNotification('❌ ' + errorMsg, true);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> 保存新密碼';
            }
        } catch (error) {
            console.error('❌ 修改密碼錯誤:', error);
            showNotification('❌ 網絡錯誤：' + error.message, true);
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save"></i> 保存新密碼';
        }
    }
</script>
</body>
</html>
