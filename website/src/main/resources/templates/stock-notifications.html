<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>到貨通知 - ChronoTeam</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/sidebar.css">
  <style>
    /* 頁面佈局 */
    .account-container {
        display: flex;
        gap: 2rem;
        max-width: 1400px;
        margin: 2rem auto;
        padding: 0 1rem;
    }

    .main-content {
        flex: 1;
        background: white;
        border-radius: 12px;
        padding: 2rem;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        min-height: 600px;
    }

    .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
        padding-bottom: 1rem;
        border-bottom: 2px solid var(--light);
    }

    .page-title {
        font-size: 1.8rem;
        color: var(--primary);
        margin: 0;
    }

    .page-title i {
        color: var(--gold);
        margin-right: 0.5rem;
    }

    .notification-count {
        background: var(--gold);
        color: white;
        padding: 0.3rem 1rem;
        border-radius: 20px;
        font-size: 0.9rem;
        font-weight: 600;
    }

    /* 🟢 商品網格佈局 (3列) */
    .notifications-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.5rem;
        margin-bottom: 2rem;
    }

    /* 商品卡片 */
    .notification-card {
        background: white;
        border: 2px solid var(--light);
        border-radius: 12px;
        overflow: hidden;
        transition: all 0.3s ease;
        position: relative;
    }

    .notification-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        border-color: var(--gold);
    }

    .notification-card.out-of-stock {
        opacity: 0.9;
    }

    .notification-card.in-stock {
        border-color: #28a745;
        background: linear-gradient(135deg, #f8fff8 0%, white 100%);
    }

    /* 到貨標籤 */
    .stock-badge {
        position: absolute;
        top: 10px;
        right: 10px;
        padding: 0.3rem 0.8rem;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 700;
        z-index: 10;
    }

    .stock-badge.out-of-stock {
        background: #dc3545;
        color: white;
    }

    .stock-badge.in-stock {
        background: #28a745;
        color: white;
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
    }

    /* 商品圖片 */
    .notification-image {
        width: 100%;
        height: 250px;
        object-fit: cover;
        background: #f8f9fa;
    }

    /* 商品信息 */
    .notification-info {
        padding: 1rem;
    }

    .notification-brand {
        font-size: 0.85rem;
        color: var(--gold);
        font-weight: 600;
        margin-bottom: 0.3rem;
    }

    .notification-name {
        font-size: 1rem;
        color: var(--primary);
        font-weight: 600;
        margin-bottom: 0.5rem;
        line-height: 1.4;
        height: 2.8rem;
        overflow: hidden;
        text-overflow: ellipsis;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
    }

    .notification-price {
        font-size: 1.3rem;
        color: var(--primary);
        font-weight: 700;
        margin-bottom: 0.5rem;
    }

    .notification-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.85rem;
        color: var(--gray);
        margin-bottom: 1rem;
    }

    .subscribed-date {
        display: flex;
        align-items: center;
        gap: 0.3rem;
    }

    /* 按鈕組 */
    .notification-actions {
        display: flex;
        gap: 0.5rem;
    }

    .btn-sm {
        flex: 1;
        padding: 0.6rem;
        font-size: 0.85rem;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s;
        font-weight: 600;
        text-decoration: none;
        text-align: center;
    }

    .btn-view {
        background: var(--primary);
        color: white;
    }

    .btn-view:hover {
        background: var(--gold);
    }

    .btn-cancel {
        background: var(--light);
        color: var(--primary);
    }

    .btn-cancel:hover {
        background: #dc3545;
        color: white;
    }

    .btn-buy {
        background: #28a745;
        color: white;
    }

    .btn-buy:hover {
        background: #218838;
    }

    /* 空狀態 */
    .empty-state {
        text-align: center;
        padding: 4rem 2rem;
        color: var(--gray);
    }

    .empty-state i {
        font-size: 4rem;
        color: var(--light);
        margin-bottom: 1rem;
    }

    .empty-state h3 {
        color: var(--primary);
        margin-bottom: 0.5rem;
    }

    /* 分頁 */
    .pagination {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.5rem;
        margin-top: 2rem;
    }

    .pagination button {
        padding: 0.6rem 1rem;
        border: 2px solid var(--light);
        background: white;
        color: var(--primary);
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s;
    }

    .pagination button:hover:not(:disabled) {
        border-color: var(--gold);
        color: var(--gold);
    }

    .pagination button.active {
        background: var(--gold);
        border-color: var(--gold);
        color: white;
    }

    .pagination button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .pagination-info {
        margin: 0 1rem;
        color: var(--gray);
        font-size: 0.9rem;
    }

    /* 響應式 */
    @media (max-width: 1024px) {
        .notifications-grid {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    @media (max-width: 600px) {
        .notifications-grid {
            grid-template-columns: 1fr;
        }

        .account-container {
            flex-direction: column;
        }
    }
  </style>
</head>
<body>
<div th:replace="~{fragments/common :: navbar}"></div>

<div class="account-container">
  <!-- 左側側邊欄 -->
  <div th:replace="~{fragments/sidebar :: sidebar(activePage='stock-notifications')}"></div>

  <!-- 右側主內容 -->
  <main class="main-content">
    <div class="page-header">
      <h2 class="page-title">
        <i class="fas fa-bell"></i> 到貨通知
      </h2>
      <span class="notification-count" id="totalCount">共 <span th:text="${totalElements}">0</span> 件商品</span>
    </div>

    <!-- 🟢 商品網格 -->
    <div class="notifications-grid" id="notificationsGrid">
      <!-- Thymeleaf 渲染商品 -->
      <div th:each="notification : ${notifications}"
           class="notification-card"
           th:classappend="${notification.product.stock > 0} ? 'in-stock' : 'out-of-stock'"
           th:data-product-id="${notification.product.id}">

        <!-- 庫存狀態標籤 -->
        <span class="stock-badge"
              th:classappend="${notification.product.stock > 0} ? 'in-stock' : 'out-of-stock'"
              th:text="${notification.product.stock > 0} ? '✅ 已到貨' : '⏳ 缺貨中'">
                </span>

        <!-- 🟢 修正 1：商品圖片 (使用 product.image 字段，並拼接路徑) -->
        <img th:src="@{/images/products/{img}(img=${notification.product.image})}"
             alt="商品圖片"
             class="notification-image"
             onerror="this.src='/images/placeholder-watch.jpg'">

        <!-- 商品信息 -->
        <div class="notification-info">
          <div class="notification-brand" th:text="${notification.product.brand}">品牌</div>

          <!-- 🟢 修正 2：商品名稱 (使用 product.description 而不是 name) -->
          <div class="notification-name" th:text="${notification.product.description}">商品名稱</div>

          <div class="notification-price">
            HK$ <span th:text="${#numbers.formatDecimal(notification.product.price, 0, 'COMMA', 2, 'POINT')}">0.00</span>
          </div>

          <div class="notification-meta">
                        <span class="subscribed-date">
                            <i class="fas fa-clock"></i>
                          <!-- 🟢 修正 3：訂閱時間 (使用 createdAt 而不是 subscribedAt) -->
                            <span th:text="${#temporals.format(notification.createdAt, 'yyyy-MM-dd HH:mm')}">訂閱時間</span>
                        </span>
            <span th:if="${notification.notified}" style="color: #28a745;">
                            <i class="fas fa-check-circle"></i> 已通知
                        </span>
          </div>

          <!-- 按鈕組 -->
          <div class="notification-actions">
            <a th:href="'/product/' + ${notification.product.id}"
               class="btn-sm btn-view">
              <i class="fas fa-eye"></i> 查看
            </a>

            <!-- 已到貨：顯示購買按鈕 -->
            <a th:if="${notification.product.stock > 0}"
               th:href="'/product/' + ${notification.product.id}"
               class="btn-sm btn-buy">
              <i class="fas fa-shopping-cart"></i> 購買
            </a>

            <!-- 取消訂閱按鈕 -->
            <button th:if="${notification.product.stock == 0}"
                    class="btn-sm btn-cancel"
                    th:data-id="${notification.id}"
                    onclick="cancelNotification(this)">
              <i class="fas fa-times"></i> 取消
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 空狀態 -->
    <div th:if="${#lists.isEmpty(notifications)}" class="empty-state">
      <i class="fas fa-bell-slash"></i>
      <h3>暫無到貨通知</h3>
      <p>您還沒有訂閱任何商品，去瀏覽商品並點擊「到貨通知」吧！</p>
      <a href="/browse" class="btn btn-primary" style="margin-top: 1rem;">
        <i class="fas fa-search"></i> 瀏覽商品
      </a>
    </div>

    <!-- 分頁 -->
    <div th:if="${totalPages > 1}" class="pagination">
      <button th:if="${currentPage > 0}"
              th:onclick="'changePage(' + (${currentPage - 1}) + ')'">
        <i class="fas fa-chevron-left"></i> 上一頁
      </button>

      <div class="pagination-info">
        第 <span th:text="${currentPage + 1}">1</span> 頁 / 共 <span th:text="${totalPages}">1</span> 頁
      </div>

      <button th:if="${currentPage < totalPages - 1}"
              th:onclick="'changePage(' + (${currentPage + 1}) + ')'">
        下一頁 <i class="fas fa-chevron-right"></i>
      </button>
    </div>
  </main>
</div>

<div th:replace="~{fragments/common :: modals}"></div>
<script th:inline="javascript">const isLoggedIn = [[${#authorization.expression('isAuthenticated()')} ?: false]]; </script>
<script src="/js/common.js"></script>

<script>
  // 分頁跳轉
  function changePage(page) {
      window.location.href = `/account/stock-notifications?page=${page}&size=12`;
  }

  // 取消訂閱
  async function cancelNotification(btn) {
      const notificationId = btn.getAttribute('data-id');

      if (!confirm('確定要取消這個商品的到貨通知嗎？')) return;

      try {
          const response = await fetch(`/api/stock-notification/unsubscribe-by-id/${notificationId}`, {
              method: 'DELETE'
          });

          const result = await response.json();

          if (result.success) {
              showNotification('✅ 已取消訂閱');
              // 移除卡片
              btn.closest('.notification-card').remove();

              // 更新總數
              const grid = document.getElementById('notificationsGrid');
              const count = grid.children.length;
              document.getElementById('totalCount').innerHTML = `共 ${count} 件商品`;

              // 如果沒有商品了，顯示空狀態
              if (count === 0) {
                  location.reload();
              }
          } else {
              showNotification('❌ ' + result.message, true);
          }
      } catch (error) {
          console.error('取消訂閱錯誤:', error);
          showNotification('❌ 網絡錯誤，請稍後重試', true);
      }
  }
</script>
</body>
</html>
