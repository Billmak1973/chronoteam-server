<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的訂單 - ChronoTeam</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/sidebar.css">
    <style>
        /* 佈局相關 */
        .dashboard-container { display: flex; min-height: calc(100vh - 150px); max-width: 1400px; margin: 2rem auto; padding: 0 1rem; gap: 2rem; }
        .main-content { flex: 1; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 2.5rem; }
        .page-title { font-size: 1.8rem; color: var(--primary); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.8rem; border-bottom: 2px solid var(--light); padding-bottom: 1rem; }
        .page-title i { color: var(--gold); }
        .page-subtitle { color: var(--gray); margin-bottom: 2rem; font-size: 0.95rem; }

        /* 訂單卡片 */
        .order-card { background: white; border: 1px solid #e9ecef; border-radius: 12px; margin-bottom: 1.5rem; overflow: hidden; transition: all 0.3s; }
        .order-card:hover { box-shadow: 0 8px 25px rgba(0,0,0,0.08); transform: translateY(-2px); }

        .order-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; background: var(--light); border-bottom: 1px solid #e9ecef; flex-wrap: wrap; gap: 1rem; }
        .order-no { font-weight: 600; color: var(--primary); font-family: monospace; font-size: 0.95rem; }
        .order-time { color: var(--gray); font-size: 0.85rem; }

        .order-body { padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1.5rem; }
        .order-info { flex: 1; min-width: 200px; }
        .order-info p { margin-bottom: 0.5rem; color: var(--gray); font-size: 0.9rem; }
        .order-info p strong { color: var(--primary); }

        .order-amount { font-size: 1.8rem; font-weight: 700; color: var(--accent); }

        /* 狀態徽章 */
        .status-badge { padding: 0.4rem 1rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; display: inline-flex; align-items: center; gap: 0.4rem; }
        .status-PENDING { background: #fff3cd; color: #856404; }
        .status-PAID { background: #d4edda; color: #155724; }
        .status-SHIPPED { background: #cce5ff; color: #004085; }
        .status-COMPLETED { background: #d1ecf1; color: #0c5460; }
        .status-CANCELLED { background: #f8d7da; color: #721c24; }

        .order-actions { display: flex; gap: 0.8rem; }
        .btn-sm { padding: 0.5rem 1rem; font-size: 0.85rem; border-radius: 6px; text-decoration: none; cursor: pointer; border: none; transition: 0.3s; display: inline-flex; align-items: center; gap: 0.4rem; }
        .btn-view { background: var(--light); color: var(--primary); border: 1px solid #ddd; }
        .btn-view:hover { background: var(--gold); color: white; border-color: var(--gold); }
        .btn-pay { background: var(--accent); color: white; }
        .btn-pay:hover { background: #c73e54; }

        .empty-state { text-align: center; padding: 4rem 2rem; }
        .empty-state i { font-size: 4rem; color: #ddd; margin-bottom: 1rem; }

        .footer { background: var(--primary); color: rgba(255, 255, 255, 0.7); padding: 2rem; text-align: center; margin-top: 3rem; }
        @media (max-width: 900px) { .dashboard-container { flex-direction: column; } }
    </style>
</head>
<body>
<div th:replace="~{fragments/common :: navbar}"></div>

<div class="dashboard-container">
    <!-- 🟢 引入側邊欄，高亮 'orders' -->
    <div th:replace="~{fragments/sidebar :: sidebar(activePage='orders')}"></div>

    <main class="main-content">
        <h2 class="page-title"><i class="fas fa-box"></i> 我的訂單</h2>
        <p class="page-subtitle">查看您的所有購買記錄與訂單狀態</p>

        <!-- 🟢 訂單列表 -->
        <div th:if="${!orders.isEmpty()}">
            <div class="order-card" th:each="order : ${orders}">
                <!-- 訂單頭部：訂單號與時間 -->
                <div class="order-header">
                    <div class="order-no">
                        <i class="fas fa-receipt" style="color: var(--gold); margin-right: 0.5rem;"></i>
                        訂單編號：<span th:text="${order.orderNo}">ORD-123456</span>
                    </div>
                    <div class="order-time">
                        <i class="far fa-clock"></i>
                        <span th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm:ss')}">2026-01-01 12:00:00</span>
                    </div>
                </div>

                <!-- 訂單主體：狀態、金額、操作 -->
                <div class="order-body">
                    <div class="order-info">
                        <p>訂單狀態：
                            <span class="status-badge" th:classappend="'status-' + ${order.status}">
                                <i class="fas" th:class="${order.status.name() == 'PENDING'} ? 'fa-exclamation-circle' :
                                                         (${order.status.name() == 'PAID'} ? 'fa-check-circle' :
                                                         (${order.status.name() == 'SHIPPED'} ? 'fa-truck' :
                                                         (${order.status.name() == 'COMPLETED'} ? 'fa-star' : 'fa-times-circle')))"></i>
                                <span th:text="${order.status.name() == 'PENDING'} ? '待付款' :
                                               (${order.status.name() == 'PAID'} ? '已付款/待發貨' :
                                               (${order.status.name() == 'SHIPPED'} ? '已發貨' :
                                               (${order.status.name() == 'COMPLETED'} ? '已完成' : '已取消')))">狀態</span>
                            </span>
                        </p>
                        <p>支付方式：<strong th:text="${order.paymentMethod}">PAYPAL_SIM</strong></p>
                        <p th:if="${order.paidAt != null}">付款時間：<strong th:text="${#temporals.format(order.paidAt, 'yyyy-MM-dd HH:mm')}">-</strong></p>
                    </div>

                    <div class="order-amount">
                        HK$ <span th:text="${#numbers.formatDecimal(order.totalAmount, 1, 'COMMA', 0, 'POINT')}">0</span>
                    </div>

                    <div class="order-actions">
                        <a href="javascript:void(0)" class="btn-sm btn-view" onclick="showNotification('📦 訂單詳情頁開發中...')">
                            <i class="fas fa-eye"></i> 查看詳情
                        </a>
                        <!-- 🟢 如果是待付款狀態，顯示「去支付」按鈕，跳轉到結帳頁 -->
                        <a th:if="${order.status.name() == 'PENDING'}"
                           th:href="@{/checkout(orderNo=${order.orderNo})}"
                           class="btn-sm btn-pay">
                            <i class="fas fa-credit-card"></i> 去支付
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- 🟢 空狀態 -->
        <div th:if="${orders.isEmpty()}" class="empty-state">
            <i class="fas fa-box-open"></i>
            <h3 style="color: var(--primary); margin-bottom: 0.5rem;">您還沒有任何訂單</h3>
            <p style="color: var(--gray); margin-bottom: 1.5rem;">快去瀏覽精選名錶，開啟您的購物之旅吧！</p>
            <a href="/browse" class="btn btn-gold"><i class="fas fa-search"></i> 瀏覽商品</a>
        </div>
    </main>
</div>

<footer class="footer">
    <p>&copy; <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy')}">2026</span> ChronoTeam. All Rights Reserved.</p>
</footer>

<div th:replace="~{fragments/common :: modals}"></div>
<script th:inline="javascript">
    const isLoggedIn = [[${#authorization.expression('isAuthenticated()')} ?: false]];
</script>
<script src="/js/common.js"></script>
</body>
</html>
