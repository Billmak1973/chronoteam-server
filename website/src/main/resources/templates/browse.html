<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - ChronoTeam'">瀏覽商品</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!--  1. 引入公共 CSS (包含導航欄、按鈕、購物車下拉等所有公共樣式) -->
    <link rel="stylesheet" href="/css/common.css">

    <!--  2. 僅保留 browse 頁面專屬的 CSS -->
    <style>
        .browse-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
        }
        .filter-sidebar {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            height: fit-content;
            position: sticky;
            top: 100px;
        }
        .filter-section {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #e9ecef;
        }
        .filter-section h3 {
            font-size: 1rem;
            margin-bottom: 1rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .filter-option {
            display: block;
            padding: 0.5rem 0;
            color: #6c757d;
            cursor: pointer;
            transition: color 0.2s;
        }
        .filter-option:hover { color: var(--gold); }
        .filter-option input[type="checkbox"],
        .filter-option input[type="radio"] { margin-right: 0.5rem; }

        .products-section { display: flex; flex-direction: column; }
        .products-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .products-count { color: #6c757d; font-size: 0.9rem; }
        .sort-dropdown {
            padding: 0.5rem 1rem;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            background: white;
            cursor: pointer;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid #e9ecef;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        /*  修改：加入 position: relative 用於定位愛心按鈕 */
        .product-img {
            position: relative;
            height: 250px;
            background: linear-gradient(135deg, #f5f5f5, #e9ecef);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* 防止愛心按鈕超出邊界 */
        }
        .product-img img { width: 100%; height: 100%; object-fit: cover; }

        /*  新增：收藏愛心按鈕樣式 */
        .favorite-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.95);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .favorite-btn:hover {
            transform: scale(1.15);
            background: white;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }
        .favorite-btn i {
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .product-info { padding: 1rem; }
        .product-brand { color: var(--gold); font-weight: 600; font-size: 0.85rem; }
        .product-name { font-weight: 600; margin: 0.3rem 0; color: var(--primary); }
        .product-price { color: var(--accent); font-size: 1.3rem; font-weight: 700; margin: 0.5rem 0; }

        .pagination { display: flex; justify-content: center; gap: 0.5rem; margin-top: 3rem; }
        .pagination a, .pagination span {
            padding: 0.6rem 1rem;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            text-decoration: none;
            color: var(--primary);
            transition: all 0.2s;
        }
        .pagination a:hover { border-color: var(--gold); background: var(--gold); color: white; }
        .pagination .active { background: var(--gold); border-color: var(--gold); color: white; }

        /* 響應式調整 */
        @media (max-width: 768px) {
            .browse-container { grid-template-columns: 1fr; }
            .filter-sidebar {
                position: fixed;
                left: -100%;
                top: 0;
                height: 100vh;
                z-index: 1000;
                transition: left 0.3s;
                width: 280px;
            }
            .filter-sidebar.open { left: 0; }
        }
    </style>
</head>

<body>
<!--  3. 引入公共導航欄 (自動包含完整的購物車下拉菜單和用戶菜單) -->
<div th:replace="~{fragments/common :: navbar}"></div>

<div class="browse-container">
    <!-- 側邊篩選欄 -->
    <aside class="filter-sidebar">
        <!-- 分類篩選 -->
        <div class="filter-section">
            <h3><i class="fas fa-th-large"></i> 分類</h3>
            <label class="filter-option">
                <input type="checkbox" name="category" value="dress"
                       th:checked="${currentFilters['category'] != null && #lists.contains(currentFilters['category'], 'dress')}">
                正裝錶
            </label>
            <label class="filter-option">
                <input type="checkbox" name="category" value="dive"
                       th:checked="${currentFilters['category'] != null && #lists.contains(currentFilters['category'], 'dive')}">
                潛水錶
            </label>
            <label class="filter-option">
                <input type="checkbox" name="category" value="chronograph"
                       th:checked="${currentFilters['category'] != null && #lists.contains(currentFilters['category'], 'chronograph')}">
                計時碼錶
            </label>
            <label class="filter-option">
                <input type="checkbox" name="category" value="vintage"
                       th:checked="${currentFilters['category'] != null && #lists.contains(currentFilters['category'], 'vintage')}">
                古董錶
            </label>
        </div>

        <!-- 品牌篩選 -->
        <div class="filter-section">
            <h3><i class="fas fa-crown"></i> 品牌</h3>
            <label class="filter-option">
                <input type="checkbox" name="brand" value="rolex"
                       th:checked="${currentFilters['brand'] != null && #lists.contains(currentFilters['brand'], 'rolex')}">
                Rolex 勞力士
            </label>
            <label class="filter-option">
                <input type="checkbox" name="brand" value="omega"
                       th:checked="${currentFilters['brand'] != null && #lists.contains(currentFilters['brand'], 'omega')}">
                Omega 歐米茄
            </label>
            <label class="filter-option">
                <input type="checkbox" name="brand" value="patek"
                       th:checked="${currentFilters['brand'] != null && #lists.contains(currentFilters['brand'], 'patek')}">
                Patek Philippe 百達翡麗
            </label>
            <label class="filter-option">
                <input type="checkbox" name="brand" value="ap"
                       th:checked="${currentFilters['brand'] != null && #lists.contains(currentFilters['brand'], 'ap')}">
                Audemars Piguet 愛彼
            </label>
            <label class="filter-option">
                <input type="checkbox" name="brand" value="cartier"
                       th:checked="${currentFilters['brand'] != null && #lists.contains(currentFilters['brand'], 'cartier')}">
                Cartier 卡地亞
            </label>
            <label class="filter-option">
                <input type="checkbox" name="brand" value="others"
                       th:checked="${currentFilters['brand'] != null && #lists.contains(currentFilters['brand'], 'others')}">
                其他品牌
            </label>
        </div>

        <!-- 價格區間 -->
        <div class="filter-section">
            <h3><i class="fas fa-tag"></i> 價格區間</h3>
            <label class="filter-option">
                <input type="radio" name="priceRange" value="0-5000"
                       th:checked="${currentFilters['priceRange'] == '0-5000'}">
                HK$ 0 - 5,000
            </label>
            <label class="filter-option">
                <input type="radio" name="priceRange" value="5000-20000"
                       th:checked="${currentFilters['priceRange'] == '5000-20000'}">
                HK$ 5,000 - 20,000
            </label>
            <label class="filter-option">
                <input type="radio" name="priceRange" value="20000-50000"
                       th:checked="${currentFilters['priceRange'] == '20000-50000'}">
                HK$ 20,000 - 50,000
            </label>
            <label class="filter-option">
                <input type="radio" name="priceRange" value="50000+"
                       th:checked="${currentFilters['priceRange'] == '50000+'}">
                HK$ 50,000+
            </label>
        </div>

        <button type="button" class="btn btn-primary" onclick="applyFilters()"
                style="width: 100%; padding: 0.8rem;">
            <i class="fas fa-filter"></i> 套用篩選
        </button>

        <!-- ========================================== -->
        <!-- 管理員專屬：新增物品按鈕 (僅 admin 可見) -->
        <!-- ========================================== -->
        <button th:if="${#authentication.name == 'admin'}"
                type="button"
                class="btn btn-gold"
                onclick="showNotification('🔒 新增物品功能開發中，敬請期待...')"
                style="width: 100%; padding: 0.8rem; margin-top: 1rem; font-weight: 600; border: 2px solid var(--gold);">
            <i class="fas fa-plus-circle"></i> 新增物品
        </button>

    </aside>

    <!-- 商品區域 -->
    <section class="products-section">
        <div class="products-header">
                <span class="products-count">
                    共 <strong th:text="${totalElements}">0</strong> 件商品
                </span>
            <select class="sort-dropdown" onchange="changeSort(this.value)">
                <option value="newest" th:selected="${currentSort == null || currentSort == 'newest'}">最新上架</option>
                <option value="price-asc" th:selected="${currentSort == 'price-asc'}">價格：低到高</option>
                <option value="price-desc" th:selected="${currentSort == 'price-desc'}">價格：高到低</option>
            </select>
        </div>

        <!-- 商品網格 -->
        <div class="products-grid" th:if="${not #lists.isEmpty(products)}">
            <div class="product-card" th:each="product : ${products}">
                <div class="product-img">
                    <img th:src="@{/images/products/{img}(img=${product.image})}" th:alt="${product.description}"
                         onerror="this.src='/images/placeholder.png'">

                    <!--  新增：收藏按鈕 -->
                    <button class="favorite-btn"
                            th:onclick="|toggleFavorite(${product.id}, this)|"
                            title="收藏商品">
                        <!-- 根據後端傳入的 favoriteProductIds 判斷初始狀態 -->
                        <i th:class="${favoriteProductIds != null && favoriteProductIds.contains(product.id)} ? 'fas fa-heart' : 'far fa-heart'"
                           th:style="${favoriteProductIds != null && favoriteProductIds.contains(product.id)} ? 'color: var(--accent);' : 'color: #999;'"></i>
                    </button>
                </div>
                <div class="product-info">
                    <div class="product-brand" th:text="${product.category}">Category</div>
                    <div class="product-name" th:text="${product.description}">Product Name</div>
                    <div class="product-price">
                        HK$ <span th:text="${#numbers.formatDecimal(product.price, 1, 'COMMA', 0, 'POINT')}">0</span>
                    </div>
                    <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                        <a th:href="@{/product/{id}(id=${product.id})}" class="btn btn-outline"
                           style="flex: 1; text-align: center; padding: 0.5rem;">
                            <i class="fas fa-eye"></i> 詳情
                        </a>
                        <!--  調用 common.js 中的 addToCart，會自動更新導航欄的購物車 -->
                        <button type="button" th:onclick="|addToCart(${product.id})|" class="btn btn-primary"
                                style="flex: 1; text-align: center; padding: 0.5rem;">
                            <i class="fas fa-cart-plus"></i> 加入
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 無商品提示 -->
        <div th:if="${#lists.isEmpty(products)}"
             style="text-align: center; padding: 4rem 2rem; background: white; border-radius: 12px;">
            <i class="fas fa-search" style="font-size: 4rem; color: #e9ecef; margin-bottom: 1rem;"></i>
            <h3 style="color: var(--primary); margin-bottom: 0.5rem;">暫無商品</h3>
            <p style="color: #6c757d;">抱歉，沒有符合條件的商品</p>
            <a href="/browse" class="btn btn-primary" style="margin-top: 1rem;">
                <i class="fas fa-undo"></i> 清除篩選
            </a>
        </div>

        <!-- 分頁 -->
        <div class="pagination" th:if="${totalPages > 1}">
            <a th:if="${currentPage > 1}"
               th:href="@{/browse(page=${currentPage - 1}, ${buildQueryString(currentFilters)})}">
                <i class="fas fa-chevron-left"></i> 上一頁
            </a>
            <span th:each="i : ${#numbers.sequence(1, totalPages)}" th:class="${i == currentPage} ? 'active' : ''"
                  th:text="${i}">1</span>
            <a th:if="${currentPage < totalPages}"
               th:href="@{/browse(page=${currentPage + 1}, ${buildQueryString(currentFilters)})}">
                下一頁 <i class="fas fa-chevron-right"></i>
            </a>
        </div>
    </section>
</div>

<!--  4. 引入公共登入/註冊彈窗 HTML -->
<div th:replace="~{fragments/common :: modals}"></div>

<!--  5. 注入後端登入狀態變量 (必須在 common.js 之前) -->
<script th:inline="javascript">
    const isLoggedIn = [[${ #authorization.expression('isAuthenticated()') } ?: false]];
</script>

<!--  6. 引入公共 JS (包含購物車下拉、加入購物車、登入/登出邏輯等) -->
<script src="/js/common.js"></script>

<!--  7. 僅保留 browse 頁面專屬的 JS -->
<script>
    // 套用篩選
    function applyFilters() {
        const checkboxes = document.querySelectorAll('.filter-sidebar input:checked');
        const params = new URLSearchParams();
        checkboxes.forEach(input => {
            params.append(input.name, input.value);
        });
        window.location.href = '/browse?' + params.toString();
    }

    // 改變排序
    function changeSort(value) {
        const currentUrl = new URL(window.location.href);
        currentUrl.searchParams.set('sort', value);
        window.location.href = currentUrl.toString();
    }

    //  新增：收藏/取消收藏功能
    async function toggleFavorite(productId, btn) {
        // 1. 檢查是否登入
        if (typeof isLoggedIn === 'undefined' || !isLoggedIn) {
            showNotification('❌ 請先登入後再收藏商品！', true);
            setTimeout(() => openLoginModal(), 500);
            return;
        }

        const icon = btn.querySelector('i');
        // fas 代表實心(已收藏)，far 代表空心(未收藏)
        const isCurrentlyFavorite = icon.classList.contains('fas');

        try {
            // 2. 調用後端 API 切換狀態
            const response = await fetch(`/api/favorites/toggle/${productId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });

            const result = await response.json();

            if (response.ok && result.success) {
                if (isCurrentlyFavorite) {
                    // 3a. 取消收藏：變為空心灰色
                    icon.classList.remove('fas');
                    icon.classList.add('far');
                    icon.style.color = '#999';
                    showNotification('💔 已取消收藏');
                } else {
                    // 3b. 添加收藏：變為實心紅色，並加上彈跳動畫
                    icon.classList.remove('far');
                    icon.classList.add('fas');
                    icon.style.color = 'var(--accent)';
                    showNotification('❤️ 已加入收藏');

                    // 彈跳動畫反饋
                    btn.style.transform = 'scale(1.3)';
                    setTimeout(() => btn.style.transform = 'scale(1)', 200);
                }
            } else {
                showNotification('❌ ' + (result.message || '操作失敗'), true);
            }
        } catch (error) {
            console.error('收藏操作失敗:', error);
            showNotification('❌ 網絡錯誤', true);
        }
    }
</script>
</body>
</html>
